<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6aff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Sparkles icon (lucide) centered at 16,16 scaled to fit -->
  <g transform="translate(16,16)" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- main star -->
    <path d="M0 -7 L1.5 -1.5 L7 0 L1.5 1.5 L0 7 L-1.5 1.5 L-7 0 L-1.5 -1.5 Z"/>
    <!-- top-right small star -->
    <path d="M5.5 -8.5 L6.2 -6.8 L8 -6 L6.2 -5.2 L5.5 -3.5 L4.8 -5.2 L3 -6 L4.8 -6.8 Z"/>
    <!-- bottom-left small dot -->
    <path d="M-6 6 L-5.5 4.8 L-4 4 L-5.5 3.2 L-6 2 L-6.5 3.2 L-8 4 L-6.5 4.8 Z"/>
  </g>
</svg>
